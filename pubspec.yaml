name: interguard
description: "InterGuard - Block your ads by DNS"
publish_to: 'none'
version: 1.2.6

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  http: ^1.2.2
  url_launcher: ^6.3.1
  intl: ^0.19.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  lottie: ^3.1.2
  cupertino_icons: ^1.0.8
  ota_update: ^7.1.0
  package_info_plus: ^8.3.1
  flutter_local_notifications: ^17.2.2
  workmanager: ^0.9.0+3
  permission_handler: ^11.3.1
  flutter_background_service: ^5.0.10
  window_manager: ^0.5.1
  onesignal_flutter: ^5.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "logo.png"
  windows:
    generate: true
    image_path: "logo.png"
